name: Deploy to GitHub Pages (producción)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        # Inyecta el backend real (secret N8N_BASE_URL) como var pública de build.
        # Sin este valor, la app cae a la capa mock (demo sin backend).
        run: npm run build
        env:
          NEXT_PUBLIC_N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - id: deployment
        uses: actions/deploy-pages@v4
